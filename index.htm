<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Smart POS System</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

/* ======================
GLOBAL
====================== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0f172a;
  color:white;
}

/* ======================
LAYOUT MODES
====================== */

body.mobile .product-grid{
  grid-template-columns:repeat(2,1fr);
}

body.desktop .product-grid{
  grid-template-columns:repeat(3,1fr);
}

/* ======================
HEADER
====================== */

header{
  position:sticky;
  top:0;
  z-index:1000;
  background:#111827;
  padding:12px;
  display:flex;
  gap:10px;
  align-items:center;
}

header h1{
  font-size:16px;
}

#search{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

/* ======================
PRODUCTS
====================== */

.product-grid{
  display:grid;
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  color:black;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

.card-body{
  padding:8px;
}

.price{
  color:#2563eb;
  font-weight:bold;
}

.add-btn{
  width:100%;
  padding:8px;
  border:none;
  background:#3b82f6;
  color:white;
  border-radius:8px;
  margin-top:8px;
}

/* ======================
CART (DESKTOP)
====================== */

.cart{
  position:fixed;
  right:0;
  top:0;
  width:350px;
  height:100vh;
  background:#111827;
  padding:15px;
  overflow:auto;
  display:none;
}

body.desktop .cart{
  display:block;
}

.cart-item{
  background:#1f2937;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

/* ======================
MOBILE CART BUTTON
====================== */

.mobile-cart-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#3b82f6;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:24px;
  z-index:9999;
}

body.mobile .mobile-cart-btn{
  display:flex;
}

/* ======================
CHECKOUT FORM
====================== */

input{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:none;
  border-radius:8px;
}

.checkout-btn{
  width:100%;
  padding:12px;
  background:#10b981;
  border:none;
  border-radius:8px;
  color:white;
}

/* ======================
OFFLINE STATUS
====================== */

.offline{
  background:red;
  padding:5px;
  text-align:center;
  font-size:12px;
}

</style>
</head>

<body>

<div id="status" class="offline" style="display:none;">
OFFLINE MODE ACTIVE
</div>

<header>
<h1>SMART POS</h1>
<input id="search" placeholder="Search product...">
</header>

<div id="products" class="product-grid"></div>

<div class="cart" id="cart"></div>

<div class="mobile-cart-btn" onclick="toggleCart()">
🛒 <span id="count">0</span>
</div>

<script>

/* ======================
SUPABASE
====================== */

const supabaseClient = supabase.createClient(
"https://gwqnvhbzvzfzryxxdmui.supabase.co",
"sb_publishable_okO0KEz-dX9jWd4f5ixtTQ_w0PZEhNw"
);

/* ======================
DEVICE DETECTION
====================== */

function detectDevice(){

  if(/Android|iPhone|iPad|Mobile/i.test(navigator.userAgent)){
    document.body.classList.add("mobile");
  }else{
    document.body.classList.add("desktop");
  }
}

detectDevice();

/* ======================
STATE
====================== */

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let offlineQueue =
JSON.parse(localStorage.getItem("queue")) || [];

/* ======================
LOAD PRODUCTS
====================== */

async function loadProducts(){

  const { data, error } =
  await supabaseClient
  .from("products")
  .select("*");

  if(error){
    console.log(error);
    return;
  }

  renderProducts(data);
}

/* ======================
RENDER PRODUCTS
====================== */

function renderProducts(products){

  const box =
  document.getElementById("products");

  box.innerHTML = "";

  products.forEach(p=>{

    box.innerHTML += `

    <div class="card">

      <img src="${p.image_url}">

      <div class="card-body">

        <h4>${p.name}</h4>

        <p class="price">₱${p.price}</p>

        <button class="add-btn"
        onclick='add(${JSON.stringify(p)})'>
        Add
        </button>

      </div>

    </div>
    `;
  });
}

/* ======================
ADD TO CART
====================== */

function add(p){

const found =
cart.find(i=>i.id===p.id);

if(found){
found.qty++;
}else{
cart.push({...p, qty:1});
}

save();
renderCart();
}

/* ======================
CART
====================== */

function renderCart(){

const box =
document.getElementById("cart");

box.innerHTML = "";

let total=0;
let count=0;

cart.forEach((i,index)=>{

total += i.price * i.qty;
count += i.qty;

box.innerHTML += `

<div class="cart-item">

<h4>${i.name}</h4>
<p>₱${i.price} x ${i.qty}</p>

<button onclick="removeItem(${index})">
Remove
</button>

</div>
`;
});

box.innerHTML += `
<h3>Total: ₱${total}</h3>

<input id="name" placeholder="Name">
<input id="address" placeholder="Address">

<button class="checkout-btn"
onclick="checkout()">
Checkout
</button>
`;

document.getElementById("count").innerText=count;
}

/* ======================
REMOVE
====================== */

function removeItem(i){
cart.splice(i,1);
save();
renderCart();
}

/* ======================
SAVE
====================== */

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
}

/* ======================
OFFLINE CHECKOUT SYSTEM
====================== */

async function checkout(){

const name =
document.getElementById("name").value;

const address =
document.getElementById("address").value;

const order = {
name,
address,
cart,
date:new Date().toISOString()
};

if(!navigator.onLine){

offlineQueue.push(order);
localStorage.setItem("queue",JSON.stringify(offlineQueue));

alert("Saved offline");
return;
}

await sendOrder(order);
}

/* ======================
SEND ORDER
====================== */

async function sendOrder(order){

await supabaseClient
.from("orders")
.insert([order]);

alert("Order saved");
cart=[];
save();
renderCart();
}

/* ======================
SYNC OFFLINE
====================== */

async function sync(){

if(!navigator.onLine) return;

for(const o of offlineQueue){

await sendOrder(o);
}

offlineQueue=[];
localStorage.removeItem("queue");
}

window.addEventListener("online",sync);

/* ======================
CART TOGGLE MOBILE
====================== */

function toggleCart(){
document.getElementById("cart")
.style.display =
document.getElementById("cart").style.display==="block"
?"none":"block";
}

/* ======================
SEARCH
====================== */

document.getElementById("search")
.addEventListener("input",(e)=>{

const k = e.target.value.toLowerCase();

document.querySelectorAll(".card")
.forEach(c=>{

c.style.display =
c.innerText.toLowerCase().includes(k)
?"block":"none";

});
});

/* ======================
INIT
====================== */

loadProducts();
renderCart();
sync();

</script>

</body>
</html>
