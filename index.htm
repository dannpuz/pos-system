<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>POS System</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>
<body>

<header>

  <h1>CUSTOMERS ORDER FORM</h1>

  <input type="text" id="search" placeholder="Search item...">

  <div class="cart-icon" onclick="toggleCart()">
    🛒 <span id="cart-count">0</span>
  </div>

</header>

<div class="container">

  <div id="products" class="product-grid"></div>

  <div class="cart hidden" id="cart">

    <div class="cart-header">
      <h2>Shopping Cart</h2>
      <button onclick="toggleCart()">Hide</button>
    </div>

    <div id="cart-items"></div>

    <h3>Total: ₱<span id="total">0</span></h3>

    <div class="checkout-form">

      <input id="customer_name" placeholder="Customer Name">
      <input id="store_name" placeholder="Store Name">
      <input id="address" placeholder="Complete Address">
      <input id="cell_number" placeholder="Cellphone Number">

      <button class="checkout-btn" onclick="checkout()">
        Checkout
      </button>

    </div>

  </div>

</div>

<audio id="addSound" src="sounds/add.mp3"></audio>

<script>

// =====================
// SUPABASE (FIXED)
// =====================

const SUPABASE_URL =
"https://gwqnvhbzvzfzryxxdmui.supabase.co";

const SUPABASE_KEY =
"sb_publishable_okO0KEz-dX9jWd4f5ixtTQ_w0PZEhNw";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

// =====================
// VARIABLES
// =====================

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let gpsLocation = "Unavailable";

const productsDiv = document.getElementById("products");


// =====================
// LOAD PRODUCTS
// =====================

async function loadProducts(){

  console.log("Loading products...");

  const { data, error } =
    await supabaseClient
      .from("products")
      .select("*");

  console.log("DATA:", data);
  console.log("ERROR:", error);

  if(error){
    alert("Supabase Error: " + error.message);
    return;
  }

  if(!data || data.length === 0){
    productsDiv.innerHTML =
      "<h3>No products found</h3>";
    return;
  }

  displayProducts(data);
}


// =====================
// DISPLAY PRODUCTS
// =====================

function displayProducts(products){

  productsDiv.innerHTML = "";

  products.forEach(product => {

    productsDiv.innerHTML += `
      <div class="card">

        <img src="${product.image_url}" />

        <div class="card-body">

          <h3>${product.name}</h3>

          <p>₱${product.price}</p>

          <button class="add-btn"
            onclick="addToCart(
              ${product.id},
              '${product.name}',
              ${product.price},
              '${product.image_url}'
            )">

            Add to Cart

          </button>

        </div>

      </div>
    `;
  });
}


// =====================
// ADD TO CART
// =====================

function addToCart(id,name,price,image_url){

  document.getElementById("addSound").play();

  const existing = cart.find(i => i.id === id);

  if(existing){
    existing.qty++;
  }else{
    cart.push({
      id,name,price,image_url,qty:1
    });
  }

  saveCart();
  renderCart();
}


// =====================
// CART SAVE
// =====================

function saveCart(){
  localStorage.setItem("cart",JSON.stringify(cart));
}


// =====================
// RENDER CART
// =====================

function renderCart(){

  const cartItems =
  document.getElementById("cart-items");

  cartItems.innerHTML = "";

  let total = 0;
  let count = 0;

  cart.forEach((item,i)=>{

    total += item.price * item.qty;
    count += item.qty;

    cartItems.innerHTML += `
      <div class="cart-item">

        <h4>${item.name}</h4>
        <p>₱${item.price} x ${item.qty}</p>

        <button onclick="changeQty(${i},-1)">-</button>
        <button onclick="changeQty(${i},1)">+</button>
        <button onclick="removeItem(${i})">Remove</button>

      </div>
    `;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("cart-count").innerText = count;
}


// =====================
// CART ACTIONS
// =====================

function changeQty(i,val){
  cart[i].qty += val;
  if(cart[i].qty <= 0) cart.splice(i,1);
  saveCart();
  renderCart();
}

function removeItem(i){
  cart.splice(i,1);
  saveCart();
  renderCart();
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("hidden");
}


// =====================
// CHECKOUT
// =====================

async function checkout(){

  if(cart.length === 0){
    alert("Cart is empty");
    return;
  }

  const customer_name =
  document.getElementById("customer_name").value;

  const store_name =
  document.getElementById("store_name").value;

  const address =
  document.getElementById("address").value;

  const cell_number =
  document.getElementById("cell_number").value;

  if(!customer_name || !store_name || !address || !cell_number){
    alert("Fill all fields");
    return;
  }

  await supabaseClient
    .from("customers")
    .insert([{
      customer_name,
      store_name,
      address,
      cell_number,
      gps_location:gpsLocation
    }]);

  let receipt = "RCPT-" + Date.now();
  let total = 0;

  for(let item of cart){

    total += item.price * item.qty;

    await supabaseClient
      .from("sales")
      .insert([{
        receipt_id:receipt,
        products:item.name,
        qty:item.qty,
        price:item.price,
        total:item.price * item.qty,
        customers:customer_name
      }]);
  }

  alert("Checkout Success!");

  cart = [];
  saveCart();
  renderCart();
}


// =====================
// INIT
// =====================

loadProducts();
renderCart();

</script>

</body>
</html>
