<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DAVPUMM MOTOR PARTS ORDERING SYSTEM</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0f172a;color:white}

/* HEADER */
header{
  position:sticky;top:0;z-index:10;
  background:#111827;
  padding:10px;
  display:flex;gap:10px;
}
#search{flex:1;padding:10px;border:none;border-radius:8px}

/* GRID */
.product-grid{
  display:grid;
  gap:10px;
  padding:10px;
  grid-template-columns:repeat(5,1fr);
}
@media(max-width:1024px){.product-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:768px){.product-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.product-grid{grid-template-columns:repeat(2,1fr)}}

/* CARD */
.card{background:white;color:black;border-radius:10px;overflow:hidden}
.card img{width:100%;height:100px;object-fit:cover}
.card-body{padding:8px}
.price{color:#2563eb;font-weight:bold}
.add-btn{
  width:100%;
  padding:8px;
  border:none;
  background:#3b82f6;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* CART ICON */
.cart-fab{
  position:fixed;bottom:20px;right:20px;
  width:60px;height:60px;
  border-radius:50%;
  background:#2563eb;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  z-index:1000;
}

/* CART PANEL */
.cart{
  position:fixed;right:0;top:0;
  width:320px;height:100vh;
  background:#111827;
  padding:10px;
  overflow:auto;
}

/* CART ITEM */
.item{
  background:#1f2937;
  padding:8px;
  margin-bottom:8px;
  border-radius:8px;
}
.qty{display:flex;gap:8px;align-items:center;margin-top:5px}
.qty button{padding:4px 10px;border:none;border-radius:5px}

/* CHECKOUT */
input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<div id="receiptModal" style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
z-index:2000;
align-items:center;
justify-content:center;
">

  <div style="background:white;color:black;padding:20px;width:300px;border-radius:10px;">
    <h3>Receipt</h3>
    <div id="receiptContent"></div>
    <button onclick="closeReceipt()" class="add-btn">Close</button>
  </div>

</div>

<header>
<input id="search" placeholder="Search product...">
</header>

<div id="products" class="product-grid"></div>

<div class="cart-fab" id="cartBtn">🛒 <span id="count">0</span></div>

<div class="cart" id="cartPanel" style="display:none;">
<h3>Cart</h3>
<div id="cart"></div>

<input id="customer_name" placeholder="Name">
<input id="store_name" placeholder="Store Name">
<input id="address" placeholder="Address">
<input id="cell_number" placeholder="Phone">



<button onclick="checkout()" class="add-btn">Checkout</button>
</div>

<script>

const supabaseClient = supabase.createClient(
"https://gwqnvhbzvzfzryxxdmui.supabase.co",
"sb_publishable_okO0KEz-dX9jWd4f5ixtTQ_w0PZEhNw"
);

/* STATE */
let products = [];
let cart = [];
let gps = "Unavailable";

/* LOAD PRODUCTS (FAST) */
async function loadProducts(){
  const {data} = await supabaseClient.from("products").select("*");
  products = data || [];
  renderProducts();
}

/* FAST PRODUCT RENDER (NO innerHTML LOOP) */
function renderProducts(){
  const box = document.getElementById("products");
  box.textContent = "";

  const frag = document.createDocumentFragment();

  products.forEach(p=>{
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <img src="${p.image_url}">
      <div class="card-body">
        <h4>${p.name}</h4>
        <p class="price">₱${p.price}</p>
        <button class="add-btn" data-id="${p.id}">Add</button>
      </div>
    `;
    frag.appendChild(div);
  });

  box.appendChild(frag);
}

/* EVENT DELEGATION (VERY FAST) */
document.getElementById("products")
.addEventListener("click",(e)=>{
  if(!e.target.classList.contains("add-btn")) return;

  const id = Number(e.target.dataset.id);
  const p = products.find(x=>x.id===id);

  const f = cart.find(i=>i.id===id);
  if(f) f.qty++;
  else cart.push({...p,qty:1});

  renderCart();
});

/* CART RENDER (FAST STRING BUILD ONLY ON CART) */
function renderCart(){
  const box = document.getElementById("cart");

  let html = "";
  let count = 0;

  cart.forEach((i,idx)=>{
    count += i.qty;

    html += `
      <div class="item">
        <b>${i.name}</b><br>
        ₱${i.price}

        <div class="qty">
          <button onclick="minus(${idx})">-</button>
          <span>${i.qty}</span>
          <button onclick="plus(${idx})">+</button>
        </div>
      </div>
    `;
  });

  box.innerHTML = html;
  document.getElementById("count").innerText = count;
}

/* QTY */
function minus(i){
  cart[i].qty--;
  if(cart[i].qty<=0) cart.splice(i,1);
  renderCart();
}

function plus(i){
  cart[i].qty++;
  renderCart();
}

/* CART TOGGLE */
document.getElementById("cartBtn").onclick = ()=>{
  const c = document.getElementById("cartPanel");
  c.style.display = c.style.display==="block"?"none":"block";
};

/* GPS (SAFE) */
navigator.geolocation?.getCurrentPosition(
pos=>{
  gps = `${pos.coords.latitude},${pos.coords.longitude}`;
},
()=> gps="Unavailable"
);

/* CHECKOUT */
async function checkout(){

if(cart.length === 0){
  return alert("Empty cart");
}

const name = document.getElementById("customer_name").value.trim();
const address = document.getElementById("address").value.trim();
const phone = document.getElementById("cell_number").value.trim();
const store_name = document.getElementById("store_name").value.trim();

/* VALIDATION */
if(!name || !address || !phone || !store_name){
  return alert("Complete all customer details");
}

if(!/^\d{11}$/.test(phone)){
  return alert("Phone number must be exactly 11 digits");
}}

/* ORDER OBJECT */
const order = {
  customer_name: name,
  cell_number: phone,
  gps,
  items: cart,
  status: "pending",
  created_at: new Date().toISOString()
};

/* OFFLINE */
if(!navigator.onLine){

  localStorage.setItem(
    "queue",
    JSON.stringify([
      ...JSON.parse(localStorage.getItem("queue") || "[]"),
      order
    ])
  );

  return alert("Saved offline");
}

/* =========================================
   SAVE CUSTOMER TO customers TABLE
========================================= */


 const customerData = {
  customer_name: name,
  address,
  cell_number: phone,
  store_name
};

/* UPSERT CUSTOMER */
const { error: customerError } = await supabaseClient
  .from("customers")
  .upsert([customerData], {
    onConflict: "cell_number"
  });

if(customerError){
  console.error(customerError);
  return alert(customerError.message);
}

/* =========================================
   SAVE ORDER TO sales TABLE
========================================= */

const { data, error } = await supabaseClient
  .from("sales")
  .insert([order])
  .select()
  .single();

if(error){
  console.error(error);
  return alert(error.message);
}

/* =========================================
   SHOW RECEIPT
========================================= */

showReceipt(data);

/* =========================================
   OPTIONAL EMAIL
========================================= */

try{
  await supabaseClient.functions.invoke(
    "send-order-email",
    { body: data }
  );
}catch(e){
  console.log("Email error:", e.message);
}

/* =========================================
   CLEAR CART
========================================= */

cart = [];
renderCart();

document.getElementById("customer_name").value = "";
ocument.getElementById("store_name").value = "";
document.getElementById("address").value = "";
document.getElementById("cell_number").value = "";


}
function showReceipt(order){

let total = 0;

let itemsHtml = order.items.map(i => {

  const subtotal = i.price * i.qty;
  total += subtotal;

  return `
    ${i.customer_name} x${i.qty}
    = ₱${subtotal}
  `;
}).join("<br>");

document.getElementById("receiptContent").innerHTML = `
<b>Name:</b> ${order.customer_name}<br>
<b>Phone:</b> ${order.cell_number}<br><br>

<b>Items:</b><br>
${itemsHtml}

<br><br>

<b>Total:</b> ₱${total}
`;

document.getElementById("receiptModal").style.display = "flex";
}

function closeReceipt(){
  document.getElementById("receiptModal").style.display = "none";
}
/* INIT */
loadProducts();

</script>
</body>
</html>
