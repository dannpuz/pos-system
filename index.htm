<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>DAVPUMM MOTOR PARTS ORDERING SYSTEM</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:100;
  background:#111827;
  padding:10px;
  display:flex;
  gap:10px;
}

#search{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  outline:none;
}

/* PRODUCT GRID */
.product-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  padding:10px;
}

@media(max-width:1024px){
  .product-grid{
    grid-template-columns:repeat(4,1fr);
  }
}

@media(max-width:768px){
  .product-grid{
    grid-template-columns:repeat(3,1fr);
  }
}

@media(max-width:480px){
  .product-grid{
    grid-template-columns:repeat(2,1fr);
  }
}

/* CARD */
.card{
  background:white;
  color:black;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card-body{
  padding:10px;
}

.price{
  color:#2563eb;
  font-weight:bold;
  margin:5px 0;
}

.add-btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

/* CART BUTTON */
.cart-fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#2563eb;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  z-index:1000;
  cursor:pointer;
}

/* CART PANEL */
.cart{
  position:fixed;
  top:0;
  right:0;
  width:320px;
  height:100vh;
  background:#111827;
  padding:10px;
  overflow:auto;
  z-index:999;
}

/* CART ITEM */
.item{
  background:#1f2937;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

.qty{
  display:flex;
  gap:8px;
  align-items:center;
  margin-top:5px;
}

.qty button{
  padding:4px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* INPUTS */
input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  margin-top:8px;
  outline:none;
}

/* RECEIPT */
#receiptModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  z-index:2000;
  align-items:center;
  justify-content:center;
}

.receipt-box{
  background:white;
  color:black;
  padding:20px;
  width:320px;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- RECEIPT -->
<div id="receiptModal">

  <div class="receipt-box">

    <h3>Receipt</h3>

    <br>

    <div id="receiptContent"></div>

    <br>

    <button class="add-btn" onclick="closeReceipt()">
      Close
    </button>

  </div>

</div>

<!-- HEADER -->
<header>
  <input id="search" placeholder="Search product..." />
</header>

<!-- PRODUCTS -->
<div id="products" class="product-grid"></div>

<!-- CART BUTTON -->
<div class="cart-fab" id="cartBtn">
  🛒 <span id="count">0</span>
</div>

<!-- CART PANEL -->
<div class="cart" id="cartPanel" style="display:none;">

  <h3>Cart</h3>

  <br>

  <div id="cart"></div>

  <input id="customer_name" placeholder="Customer Name" />

  <input id="store_name" placeholder="Store Name" />

  <input id="address" placeholder="Address" />

  <input id="cell_number" placeholder="Phone Number" />

  <br>

  <button class="add-btn" onclick="checkout()">
    Checkout
  </button>

</div>

<script>

/* =========================================
   SUPABASE
========================================= */

const supabaseClient = supabase.createClient(
  "https://gwqnvhbzvzfzryxxdmui.supabase.co",
  "sb_publishable_okO0KEz-dX9jWd4f5ixtTQ_w0PZEhNw"
);

/* =========================================
   STATE
========================================= */

let products = [];
let cart = [];
let gps = "Unavailable";

/* =========================================
   GPS
========================================= */

navigator.geolocation?.getCurrentPosition(
  pos => {
    gps = `${pos.coords.latitude},${pos.coords.longitude}`;
  },
  () => {
    gps = "Unavailable";
  }
);

/* =========================================
   LOAD PRODUCTS
========================================= */

async function loadProducts(){

  const { data, error } = await supabaseClient
    .from("products")
    .select("*");

  if(error){
    console.error(error);
    alert(error.message);
    return;
  }

  products = data || [];

  renderProducts();
}

/* =========================================
   RENDER PRODUCTS
========================================= */

function renderProducts(){

  const box = document.getElementById("products");

  box.innerHTML = "";

  const keyword = document
    .getElementById("search")
    .value
    .toLowerCase();

  const filtered = products.filter(p =>
    p.name?.toLowerCase().includes(keyword)
  );

  filtered.forEach(product => {

    const div = document.createElement("div");

    div.className = "card";

    div.innerHTML = `
      <img src="${product.image_url || ''}">

      <div class="card-body">

        <h4>${product.name}</h4>

        <p class="price">
          ₱${Number(product.price).toLocaleString()}
        </p>

        <button class="add-btn" data-id="${product.id}">
          Add
        </button>

      </div>
    `;

    box.appendChild(div);

  });

}

/* =========================================
   SEARCH
========================================= */

document
.getElementById("search")
.addEventListener("input", renderProducts);

/* =========================================
   ADD TO CART
========================================= */

document
.getElementById("products")
.addEventListener("click", e => {

  if(!e.target.classList.contains("add-btn")) return;

  const id = Number(e.target.dataset.id);

  const product = products.find(p => p.id === id);

  if(!product) return;

  const existing = cart.find(i => i.id === id);

  if(existing){
    existing.qty++;
  }else{
    cart.push({
      ...product,
      qty:1
    });
  }

  renderCart();

});

/* =========================================
   RENDER CART
========================================= */

function renderCart(){

  const box = document.getElementById("cart");

  let html = "";
  let count = 0;

  cart.forEach((item,index) => {

    count += item.qty;

    html += `
      <div class="item">

        <b>${item.name}</b><br>

        ₱${item.price}

        <div class="qty">

          <button onclick="minus(${index})">-</button>

          <span>${item.qty}</span>

          <button onclick="plus(${index})">+</button>

        </div>

      </div>
    `;

  });

  box.innerHTML = html;

  document.getElementById("count").innerText = count;

}

/* =========================================
   QUANTITY
========================================= */

function minus(index){

  cart[index].qty--;

  if(cart[index].qty <= 0){
    cart.splice(index,1);
  }

  renderCart();
}

function plus(index){

  cart[index].qty++;

  renderCart();
}

/* =========================================
   TOGGLE CART
========================================= */

document.getElementById("cartBtn").onclick = () => {

  const panel = document.getElementById("cartPanel");

  panel.style.display =
    panel.style.display === "block"
    ? "none"
    : "block";

};

/* =========================================
   CHECKOUT
========================================= */

async function checkout(){

  if(cart.length === 0){
    return alert("Cart is empty");
  }

  const customer_name =
    document.getElementById("customer_name").value.trim();

  const store_name =
    document.getElementById("store_name").value.trim();

  const address =
    document.getElementById("address").value.trim();

  const cell_number =
    document.getElementById("cell_number").value.trim();

  /* VALIDATION */

  if(
    !customer_name ||
    !store_name ||
    !address ||
    !cell_number
  ){
    return alert("Complete all customer details");
  }

  if(!/^\d{11}$/.test(cell_number)){
    return alert("Phone number must be exactly 11 digits");
  }

  /* ORDER OBJECT */

  const order = {
    customer_name,
    cell_number,
    gps,
    items: cart,
    status: "pending",
    created_at: new Date().toISOString()
  };

  /* CUSTOMER OBJECT */

  const customerData = {
    customer_name,
    store_name,
    address,
    cell_number
  };

  /* SAVE CUSTOMER */

  const { error: customerError } = await supabaseClient
    .from("customers")
    .insert([customerData]);

  if(customerError){
    console.error(customerError);
  }

  /* SAVE ORDER */

  const { data, error } = await supabaseClient
    .from("sales")
    .insert([order])
    .select()
    .single();

  if(error){
    console.error(error);
    return alert(error.message);
  }

  /* RECEIPT */

  showReceipt(data);

  /* OPTIONAL EMAIL */

  try{

    await supabaseClient.functions.invoke(
      "send-order-email",
      {
        body:data
      }
    );

  }catch(e){

    console.log("Email function not available");

  }

  /* CLEAR */

  cart = [];

  renderCart();

  document.getElementById("customer_name").value = "";
  document.getElementById("store_name").value = "";
  document.getElementById("address").value = "";
  document.getElementById("cell_number").value = "";

  alert("Order placed successfully");

}

/* =========================================
   RECEIPT
========================================= */

function showReceipt(order){

  let total = 0;

  const itemsHtml = order.items.map(item => {

    const subtotal = item.price * item.qty;

    total += subtotal;

    return `
      ${item.name} x${item.qty}
      = ₱${subtotal}
    `;

  }).join("<br>");

  document.getElementById("receiptContent").innerHTML = `

    <b>Name:</b>
    ${order.customer_name}

    <br><br>

    <b>Phone:</b>
    ${order.cell_number}

    <br><br>

    <b>Items:</b><br>

    ${itemsHtml}

    <br><br>

    <b>Total:</b>
    ₱${total}

  `;

  document.getElementById("receiptModal").style.display = "flex";

}

function closeReceipt(){

  document.getElementById("receiptModal").style.display = "none";

}

/* =========================================
   INIT
========================================= */

loadProducts();

</script>

</body>
</html>
