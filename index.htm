<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>POS System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

/* =========================
   GLOBAL
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{

  background:
  linear-gradient(
    135deg,
    #1e1e2f,
    #3f51b5
  );

  min-height:100vh;

  color:white;
}

/* =========================
   HEADER
========================= */

header{

  position:sticky;

  top:0;

  z-index:1000;

  background:#111827;

  padding:15px;

  display:flex;

  align-items:center;

  gap:10px;
}

header h1{

  font-size:18px;

  white-space:nowrap;
}

#search{

  flex:1;

  padding:12px;

  border:none;

  border-radius:10px;
}

/* =========================
   FLOATING CART
========================= */

.cart-icon{

  position:fixed;

  bottom:20px;

  right:20px;

  width:65px;

  height:65px;

  border-radius:50%;

  background:#3f51b5;

  display:flex;

  align-items:center;

  justify-content:center;

  font-size:26px;

  cursor:pointer;

  box-shadow:
  0 5px 15px rgba(0,0,0,0.4);

  z-index:99999;
}

#cart-count{

  position:absolute;

  top:-5px;

  right:-5px;

  background:red;

  color:white;

  border-radius:50%;

  width:25px;

  height:25px;

  display:flex;

  align-items:center;

  justify-content:center;

  font-size:12px;
}

/* =========================
   LAYOUT
========================= */

.container{

  display:flex;

  flex-direction:column;
}

/* =========================
   PRODUCTS
========================= */

.product-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fill,minmax(160px,1fr));

  gap:12px;

  padding:12px;
}

.card{

  background:white;

  color:black;

  border-radius:12px;

  overflow:hidden;

  box-shadow:
  0 4px 10px rgba(0,0,0,0.3);

  transition:0.3s;
}

.card:hover{

  transform:translateY(-3px);
}

.card img{

  width:100%;

  height:130px;

  object-fit:cover;
}

.card-body{

  padding:10px;
}

.card h3{

  font-size:14px;

  min-height:40px;
}

.price{

  color:#3f51b5;

  font-size:18px;

  font-weight:bold;

  margin-top:5px;
}

/* =========================
   BUTTONS
========================= */

button{

  border:none;

  border-radius:10px;

  cursor:pointer;

  transition:0.3s;
}

.add-btn{

  width:100%;

  margin-top:10px;

  padding:10px;

  background:#3f51b5;

  color:white;

  font-size:13px;
}

.add-btn:hover{

  background:#5c6bc0;
}

/* =========================
   CART PANEL
========================= */

.cart{

  position:fixed;

  top:0;

  right:0;

  width:100%;

  max-width:400px;

  height:100vh;

  background:#111827;

  overflow:auto;

  padding:20px;

  z-index:9999;
}

.hidden{
  display:none;
}

.cart-header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:20px;
}

.cart-item{

  border-bottom:
  1px solid #333;

  padding-bottom:10px;

  margin-bottom:15px;
}

.qty-controls{

  display:flex;

  gap:8px;

  margin-top:10px;

  flex-wrap:wrap;
}

.qty-controls button{

  padding:8px 10px;

  background:#3f51b5;

  color:white;
}

/* =========================
   CHECKOUT FORM
========================= */

.checkout-form{

  margin-top:20px;

  background:#1f2937;

  padding:15px;

  border-radius:15px;
}

.checkout-form input{

  width:100%;

  padding:12px;

  margin-bottom:12px;

  border:none;

  border-radius:10px;
}

.checkout-btn{

  width:100%;

  padding:14px;

  background:#10b981;

  color:white;

  font-size:16px;
}

.checkout-btn:hover{

  background:#059669;
}

/* =========================
   RECEIPT MODAL
========================= */

.receipt-modal{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  background:
  rgba(0,0,0,0.7);

  display:flex;

  align-items:center;

  justify-content:center;

  z-index:999999;
}

.receipt-box{

  background:white;

  color:black;

  width:90%;

  max-width:400px;

  border-radius:15px;

  padding:20px;
}

.receipt-box h2{

  text-align:center;

  margin-bottom:20px;
}

.receipt-box button{

  width:100%;

  margin-top:10px;

  padding:12px;

  background:#3f51b5;

  color:white;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

  header h1{

    font-size:14px;
  }

  #search{

    padding:10px;

    font-size:14px;
  }

  .product-grid{

    grid-template-columns:
    repeat(2,1fr);
  }

  .card img{

    height:110px;
  }

  .card h3{

    font-size:13px;
  }

  .price{

    font-size:15px;
  }

  .add-btn{

    font-size:12px;

    padding:8px;
  }

  .cart{

    max-width:100%;
  }
}

/* =========================
   PRINT
========================= */

@media print{

  body *{
    visibility:hidden;
  }

  .receipt-box,
  .receipt-box *{
    visibility:visible;
  }

  .receipt-box{

    position:absolute;

    left:0;
    top:0;

    width:100%;
  }
}

</style>

</head>

<body>

<header>

  <h1>CUSTOMERS ORDER FORM</h1>

  <input
    type="text"
    id="search"
    placeholder="Search item..."
  >

</header>

<!-- FLOATING CART -->

<div
  class="cart-icon"
  onclick="toggleCart()"
>
  🛒
  <span id="cart-count">0</span>
</div>

<div class="container">

  <!-- PRODUCTS -->

  <div
    id="products"
    class="product-grid"
  ></div>

  <!-- CART -->

  <div
    class="cart hidden"
    id="cart"
  >

    <div class="cart-header">

      <h2>Shopping Cart</h2>

      <button onclick="toggleCart()">
        Close
      </button>

    </div>

    <div id="cart-items"></div>

    <h3>
      Total:
      ₱<span id="total">0</span>
    </h3>

    <!-- CHECKOUT FORM -->

    <div class="checkout-form">

      <input
        type="text"
        id="customer_name"
        placeholder="Customer Name"
      >

      <input
        type="text"
        id="store_name"
        placeholder="Store Name"
      >

      <input
        type="text"
        id="address"
        placeholder="Complete Address"
      >

      <input
        type="text"
        id="cell_number"
        placeholder="Cellphone Number"
      >

      <button
        class="checkout-btn"
        onclick="checkout()"
      >
        Checkout
      </button>

    </div>

  </div>

</div>

<!-- RECEIPT MODAL -->

<div
  id="receiptModal"
  class="receipt-modal hidden"
>

  <div class="receipt-box">

    <h2>SALES RECEIPT</h2>

    <div id="receiptContent"></div>

    <button onclick="printReceipt()">
      Print Receipt
    </button>

    <button onclick="closeReceipt()">
      Close
    </button>

  </div>

</div>

<audio
  id="addSound"
  src="sounds/add.mp3"
></audio>

</body>
</html>
