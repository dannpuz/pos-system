<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>DAVPUMM MOTOR PARTS ORDERING SYSTEM</title>

  <meta name="description"
content="We deliver motorcycle parts for FREE to Bukidnon, Surigao, Butuan City, and Mati City for wholesale buyers. We offer a wide range of high-quality products, including Gibeon chains and sprockets, and many more motorcycle parts.">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
  color:white;
}

/* HEADER */

header{
  position:sticky;
  top:0;
  z-index:100;
  background:#111827;
  padding:10px;
}

#search{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  outline:none;
}

/* PRODUCTS */

.product-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  padding:10px;
}

@media(max-width:1024px){
  .product-grid{
    grid-template-columns:repeat(4,1fr);
  }
}

@media(max-width:768px){
  .product-grid{
    grid-template-columns:repeat(3,1fr);
  }
}

@media(max-width:480px){
  .product-grid{
    grid-template-columns:repeat(2,1fr);
  }
}

.card{
  background:white;
  color:black;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card-body{
  padding:10px;
}

.price{
  color:#2563eb;
  font-weight:bold;
  margin:5px 0;
}

.add-btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

/* CART BUTTON */

.cart-fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#2563eb;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
  z-index:1000;
}

/* CART PANEL */

.cart{
  position:fixed;
  top:0;
  right:0;
  width:340px;
  height:100vh;
  background:#111827;
  padding:15px;
  overflow:auto;
  z-index:999;
}

.item{
  background:#1f2937;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

.qty{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:8px;
}

.qty button{
  padding:5px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* INPUTS */

input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  margin-top:10px;
  outline:none;
}

/* RECEIPT */

#receiptModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  z-index:2000;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.receipt-box{
  background:white;
  color:black;
  width:100%;
  max-width:700px;
  border-radius:10px;
  padding:20px;
  max-height:90vh;
  overflow:auto;
}

</style>

</head>

<body>

<!-- RECEIPT -->

<div id="receiptModal">

  <div class="receipt-box">

    <div id="receiptContent"></div>

    <br>

    <button class="add-btn" onclick="closeReceipt()">
      Close
    </button>

  </div>

</div>

<!-- HEADER -->

<header>

  <div style="
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
  ">

    <h3 style="color:#60a5fa;">
      Cash On Delivery Instructions
    </h3>

    <br>

    <p>1. Browse products and add to cart.</p>
    <p>2. Complete customer details.</p>
    <p>3. Click checkout.</p>
    <p>4. Wait for confirmation call.</p>

  </div>

  <input
    id="search"
    placeholder="Search product, code, brand..."
  />

</header>

<!-- PRODUCTS -->

<div id="products" class="product-grid"></div>

<!-- CART BUTTON -->

<div class="cart-fab" id="cartBtn">

  🛒 <span id="count">0</span>

</div>

<!-- CART -->

<div class="cart" id="cartPanel" style="display:none;">

  <h2>Shopping Cart</h2>

  <br>

  <div id="cart"></div>

  <input id="customer_name" placeholder="Customer Name">

  <input id="store_name" placeholder="Store Name">

  <input id="address" placeholder="Complete Address">

  <input id="cell_number" placeholder="Phone Number">

  <br>

  <button class="add-btn" onclick="checkout()">
    Checkout
  </button>

</div>

<script>

/* =========================================
   SUPABASE
========================================= */

const supabaseClient = supabase.createClient(
 "https://gwqnvhbzvzfzryxxdmui.supabase.co",
  "sb_publishable_okO0KEz-dX9jWd4f5ixtTQ_w0PZEhNw"
);

/* =========================================
   EDGE FUNCTION URL
========================================= */

const EDGE_FUNCTION_URL =
"https://gwqnvhbzvzfzryxxdmui.supabase.co/functions/v1/send-order-email";

/* =========================================
   STATE
========================================= */

let products = [];

let cart = [];

/* =========================================
   LOAD PRODUCTS
========================================= */

async function loadProducts(){

  const { data, error } = await supabaseClient
  .from("products")
  .select("*");

  if(error){

    console.error(error);

    return alert(error.message);

  }

  products = data || [];

  renderProducts();

}

/* =========================================
   RENDER PRODUCTS
========================================= */

function renderProducts(){

  const box = document.getElementById("products");

  box.innerHTML = "";

  const keyword = document
  .getElementById("search")
  .value
  .trim()
  .toLowerCase();

  const filtered = products.filter(p => {

    const name = String(p.name || "").toLowerCase();

    const brand = String(p.brand || "").toLowerCase();

    const code = String(p.item_code || "").toLowerCase();

    return (
      name.includes(keyword) ||
      brand.includes(keyword) ||
      code.includes(keyword)
    );

  });

  filtered.forEach(product => {

    const div = document.createElement("div");

    div.className = "card";

    div.innerHTML = `

      <img src="${product.image_url || ''}">

      <div class="card-body">

        <h4>${product.name}</h4>

        <p class="price">
          ₱${Number(product.price).toLocaleString()}
        </p>

        <button
          class="add-btn"
          data-id="${product.id}"
        >
          Add To Cart
        </button>

      </div>

    `;

    box.appendChild(div);

  });

}

/* =========================================
   SEARCH
========================================= */

document
.getElementById("search")
.addEventListener("input", renderProducts);

/* =========================================
   ADD TO CART
========================================= */

document
.getElementById("products")
.addEventListener("click", e => {

  if(!e.target.classList.contains("add-btn")) return;

  const id = Number(e.target.dataset.id);

  const product = products.find(p => p.id === id);

  if(!product) return;

  const existing = cart.find(i => i.id === id);

  if(existing){

    existing.qty++;

  }else{

    cart.push({
      id:product.id,
      name:product.name,
      price:Number(product.price),
      qty:1
    });

  }

  renderCart();

});

/* =========================================
   RENDER CART
========================================= */

function renderCart(){

  const box = document.getElementById("cart");

  const countBox = document.getElementById("count");

  let html = "";

  let totalQty = 0;

  let grandTotal = 0;

  cart.forEach((item,index) => {

    const subtotal = item.price * item.qty;

    grandTotal += subtotal;

    totalQty += item.qty;

    html += `

      <div class="item">

        <b>${item.name}</b>

        <br><br>

        ₱${Number(item.price).toLocaleString()}

        <br><br>

        <b>
          Subtotal:
          ₱${subtotal.toLocaleString()}
        </b>

        <div class="qty">

          <button onclick="minus(${index})">
            -
          </button>

          <span>${item.qty}</span>

          <button onclick="plus(${index})">
            +
          </button>

        </div>

      </div>

    `;

  });

  if(cart.length > 0){

    html += `

      <div class="item" style="
        background:#2563eb;
        font-size:20px;
        text-align:center;
        font-weight:bold;
      ">

        TOTAL:
        ₱${grandTotal.toLocaleString()}

      </div>

    `;

  }else{

    html = `
      <div class="item">
        Cart is empty
      </div>
    `;

  }

  box.innerHTML = html;

  countBox.innerText = totalQty;

}

/* =========================================
   QUANTITY
========================================= */

function plus(index){

  cart[index].qty++;

  renderCart();

}

function minus(index){

  cart[index].qty--;

  if(cart[index].qty <= 0){

    cart.splice(index,1);

  }

  renderCart();

}

/* =========================================
   CART TOGGLE
========================================= */

document.getElementById("cartBtn").onclick = () => {

  const panel = document.getElementById("cartPanel");

  panel.style.display =
    panel.style.display === "block"
    ? "none"
    : "block";

};

/* =========================================
   CHECKOUT
========================================= */

async function checkout(){

  try {

    if(cart.length === 0){

      return alert("Cart is empty");

    }

    const customer_name =
      document.getElementById("customer_name").value.trim();

    const store_name =
      document.getElementById("store_name").value.trim();

    const address =
      document.getElementById("address").value.trim();

    const cell_number =
      document.getElementById("cell_number").value.trim();

    if(
      !customer_name ||
      !store_name ||
      !address ||
      !cell_number
    ){

      return alert("Complete customer details");

    }

    if(!/^\d{11}$/.test(cell_number)){

      return alert("Phone number must be 11 digits");

    }

    /* TOTAL */

    let grandTotal = 0;

    cart.forEach(item => {

      grandTotal += item.price * item.qty;

    });

    /* RECEIPT ID */

    const receipt_id = "RCPT-" + Date.now();

    /* SAVE ORDER */

    const orderData = {

      receipt_id,
      customer_name,
      store_name,
      address,
      cell_number,
      total: grandTotal

    };

    const {
      data:orderResult,
      error:orderError
    } = await supabaseClient
    .from("orders")
    .insert([orderData])
    .select()
    .single();

    if(orderError){

      console.error(orderError);

      return alert(orderError.message);

    }

    /* SAVE ITEMS */

    const itemsData = cart.map(item => ({

      order_id: orderResult.id,

      product_name: item.name,

      qty: item.qty,

      price: item.price,

      subtotal: item.price * item.qty

    }));

    const {
      error:itemError
    } = await supabaseClient
    .from("order_items")
    .insert(itemsData);

    if(itemError){

      console.error(itemError);

      return alert(itemError.message);

    }

   /* SEND EMAIL */

const emailPayload = {

  record: {

    receipt_id: receipt_id,

    customer_name: customer_name,

    store_name: store_name,

    address: address,

    cell_number: cell_number,

    total: grandTotal,

    created_at: new Date().toISOString(),

    items: cart.map(item => ({

      name: item.name,

      qty: Number(item.qty),

      price: Number(item.price)

    }))

  }

};

console.log("EMAIL PAYLOAD:", emailPayload);

const response = await fetch(
  EDGE_FUNCTION_URL,
  {

    method: "POST",

    headers: {

      "Content-Type": "application/json",

      "Authorization":
        "Bearer sb_publishable_okO0KEz-dX9jWd4f5ixtTQ_w0PZEhNw",

      "apikey":
        "sb_publishable_okO0KEz-dX9jWd4f5ixtTQ_w0PZEhNw"

    },

    body: JSON.stringify(emailPayload)

  }
);

const result = await response.json();

console.log("EMAIL RESULT:", result);

    /* SHOW RECEIPT */

    showReceipt(
      receipt_id,
      customer_name,
      store_name,
      address,
      cell_number,
      cart
    );

    /* CLEAR */

    cart = [];

    renderCart();

    document.getElementById("customer_name").value = "";

    document.getElementById("store_name").value = "";

    document.getElementById("address").value = "";

    document.getElementById("cell_number").value = "";

    alert(
      "Order placed successfully"
    );

  } catch(err){

    console.error(err);

    alert(err.message);

  }

}

/* =========================================
   RECEIPT
========================================= */

function showReceipt(
  receipt_id,
  customer_name,
  store_name,
  address,
  cell_number,
  items
){

  let total = 0;

  let rows = "";

  items.forEach(item => {

    const subtotal = item.price * item.qty;

    total += subtotal;

    rows += `

      <tr>

        <td style="
          padding:8px;
          border-bottom:1px solid #ddd;
        ">
          ${item.name}
        </td>

        <td style="
          padding:8px;
          border-bottom:1px solid #ddd;
          text-align:center;
        ">
          ${item.qty}
        </td>

        <td style="
          padding:8px;
          border-bottom:1px solid #ddd;
          text-align:right;
        ">
          ₱${Number(item.price).toLocaleString()}
        </td>

        <td style="
          padding:8px;
          border-bottom:1px solid #ddd;
          text-align:right;
        ">
          ₱${subtotal.toLocaleString()}
        </td>

      </tr>

    `;

  });

  const html = `

    <h2 style="
      text-align:center;
      color:#2563eb;
    ">
      DAVPUMM MOTOR PARTS
    </h2>

    <h3 style="
      text-align:center;
      margin-top:5px;
    ">
      SALES RECEIPT
    </h3>

    <hr>

    <p>
      <b>Receipt No:</b>
      ${receipt_id}
    </p>

    <p>
      <b>Date:</b>
      ${new Date().toLocaleString()}
    </p>

    <hr>

    <p>
      <b>Customer:</b>
      ${customer_name}
    </p>

    <p>
      <b>Store:</b>
      ${store_name}
    </p>

    <p>
      <b>Phone:</b>
      ${cell_number}
    </p>

    <p>
      <b>Address:</b>
      ${address}
    </p>

    <hr>

    <table style="
      width:100%;
      border-collapse:collapse;
    ">

      <thead>

        <tr style="background:#f3f4f6;">

          <th style="padding:8px;text-align:left;">
            Item
          </th>

          <th style="padding:8px;text-align:center;">
            Qty
          </th>

          <th style="padding:8px;text-align:right;">
            Price
          </th>

          <th style="padding:8px;text-align:right;">
            Subtotal
          </th>

        </tr>

      </thead>

      <tbody>

        ${rows}

      </tbody>

    </table>

    <hr>

    <h2 style="
      text-align:right;
      color:#16a34a;
    ">

      TOTAL:
      ₱${total.toLocaleString()}

    </h2>

  `;

  document.getElementById("receiptContent").innerHTML = html;

  document.getElementById("receiptModal").style.display = "flex";

}

/* =========================================
   CLOSE RECEIPT
========================================= */

function closeReceipt(){

  document.getElementById("receiptModal").style.display = "none";

}

/* =========================================
   INIT
========================================= */

loadProducts();

</script>

</body>

</html>
