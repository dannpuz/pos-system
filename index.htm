<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ultra Fast POS</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0f172a;
  color:white;
}

/* HEADER */

header{
  position:sticky;
  top:0;
  background:#111827;
  padding:10px;
  display:flex;
  gap:10px;
}

#search{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

/* GRID */

.product-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

/* CARD */

.card{
  background:white;
  color:black;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

.card-body{
  padding:8px;
}

.price{
  color:#2563eb;
  font-weight:bold;
}

/* BUTTON */

.add-btn{
  width:100%;
  padding:8px;
  border:none;
  background:#3b82f6;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* CART */

.cart{
  position:fixed;
  right:0;
  top:0;
  width:320px;
  height:100vh;
  background:#111827;
  padding:10px;
  overflow:auto;
}

/* OFFLINE */

.offline{
  background:red;
  text-align:center;
  font-size:12px;
  padding:5px;
  display:none;
}

</style>
</head>

<body>

<div id="offline" class="offline">
OFFLINE MODE
</div>

<header>
<input id="search" placeholder="Search product...">
</header>

<div id="products" class="product-grid"></div>

<div class="cart">
<h3>Cart</h3>
<div id="cart"></div>

<input id="name" placeholder="Name">
<input id="address" placeholder="Address">

<button onclick="checkout()">
Checkout
</button>

</div>

<script>

/* =========================
SUPABASE
========================= */

const supabaseClient = supabase.createClient(
"https://gwqnvhbzvzfzryxxdmui.supabase.co",
"sb_publishable_okO0KEz-dX9jWd4f5ixtTQ_w0PZEhNw"
);

/* =========================
STATE (React-style)
========================= */

let state = {
products: [],
cart: [],
queue: []
};

/* =========================
SET STATE (FAST RENDER)
========================= */

function setState(newState){

state = {...state, ...newState};

render();
}

/* =========================
INITIAL LOAD
========================= */

async function load(){

const { data } =
await supabaseClient
.from("products")
.select("*");

setState({ products:data });
}

load();

/* =========================
RENDER (ONLY WHAT CHANGED)
========================= */

function render(){

renderProducts();
renderCart();
}

/* =========================
PRODUCT RENDER
========================= */

function renderProducts(){

const box =
document.getElementById("products");

box.innerHTML = "";

state.products.forEach(p=>{

const div = document.createElement("div");
div.className="card";

div.innerHTML = `
<img src="${p.image_url}">
<div class="card-body">
<h4>${p.name}</h4>
<p class="price">₱${p.price}</p>
<button class="add-btn" data-id="${p.id}">
Add
</button>
</div>
`;

box.appendChild(div);
});
}

/* =========================
EVENT DELEGATION (FAST CLICK)
========================= */

document.getElementById("products")
.addEventListener("click",(e)=>{

if(!e.target.classList.contains("add-btn")) return;

const id = Number(e.target.dataset.id);

const product =
state.products.find(p=>p.id===id);

addToCart(product);
});

/* =========================
ADD TO CART (FAST STATE UPDATE)
========================= */

function addToCart(product){

const cart = [...state.cart];

const found =
cart.find(i=>i.id===product.id);

if(found){
found.qty++;
}else{
cart.push({...product, qty:1});
}

setState({cart});
}

/* =========================
CART RENDER (LIGHTWEIGHT)
========================= */

function renderCart(){

const box =
document.getElementById("cart");

let html = "";

let total = 0;

state.cart.forEach((i,index)=>{

total += i.price * i.qty;

html += `
<div>
${i.name} x${i.qty}
</div>
`;
});

html += `<h4>Total ₱${total}</h4>`;

box.innerHTML = html;
}

/* =========================
OFFLINE QUEUE SYSTEM
========================= */

function saveQueue(order){

state.queue.push(order);
localStorage.setItem("queue",JSON.stringify(state.queue));
}

/* =========================
CHECKOUT
========================= */

async function checkout(){

const order = {
id: crypto.randomUUID(),
name:document.getElementById("name").value,
address:document.getElementById("address").value,
cart:state.cart,
status:"pending"
};

/* OFFLINE MODE */

if(!navigator.onLine){

saveQueue(order);

document.getElementById("offline").style.display="block";

alert("Saved offline");

return;
}

/* ONLINE SEND */

await sendOrder(order);
}

/* =========================
SEND ORDER (CONFLICT SAFE)
========================= */

async function sendOrder(order){

const { error } =
await supabaseClient
.from("orders")
.insert([order]);

if(error){
console.log(error);
return;
}

/* CLEAR CART AFTER SUCCESS */

setState({cart:[]});
}

/* =========================
SYNC OFFLINE QUEUE
========================= */

async function syncQueue(){

if(!navigator.onLine) return;

let queue =
JSON.parse(localStorage.getItem("queue")) || [];

for(const order of queue){

await sendOrder(order);
}

/* CLEAR QUEUE */

localStorage.removeItem("queue");
state.queue = [];
}

window.addEventListener("online",syncQueue);

/* =========================
SEARCH
========================= */

document.getElementById("search")
.addEventListener("input",(e)=>{

const k = e.target.value.toLowerCase();

document.querySelectorAll(".card")
.forEach(c=>{

c.style.display =
c.innerText.toLowerCase().includes(k)
?"block":"none";

});
});

</script>

</body>
</html>
