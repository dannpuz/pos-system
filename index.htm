<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>POS System</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0f172a;
  color:white;
}

/* HEADER */

header{
  position:sticky;
  top:0;
  z-index:1000;
  background:#111827;
  padding:15px;
  display:flex;
  align-items:center;
  gap:10px;
}

header h1{
  font-size:18px;
}

#search{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
}

/* CART ICON */

.cart-icon{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:#3b82f6;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  cursor:pointer;
  z-index:9999;
  box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

#cart-count{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  width:22px;
  height:22px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
}

/* PRODUCTS */

.product-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  color:black;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

.card-body{
  padding:8px;
}

.card h3{
  font-size:13px;
  min-height:32px;
}

.price{
  color:#2563eb;
  font-weight:bold;
  margin-top:5px;
}

.add-btn{
  width:100%;
  margin-top:8px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
  font-size:12px;
}

/* CART */

.cart{
  position:fixed;
  top:0;
  right:0;
  width:100%;
  max-width:400px;
  height:100vh;
  background:#111827;
  overflow:auto;
  padding:20px;
  z-index:99999;
}

.hidden{
  display:none;
}

.cart-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.cart-item{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.qty-controls{
  display:flex;
  gap:5px;
  margin-top:10px;
}

.qty-controls button{
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

.checkout-form{
  margin-top:20px;
}

.checkout-form input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-bottom:10px;
}

.gps-box{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  font-size:13px;
}

.checkout-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#10b981;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.receipt-box{
  background:#1f2937;
  padding:15px;
  border-radius:10px;
  margin-top:20px;
  white-space:pre-line;
}

</style>
</head>

<body>

<header>

<h1>ORDER FORM</h1>

<input
type="text"
id="search"
placeholder="Search product..."
>

</header>

<div id="products" class="product-grid"></div>

<div class="cart-icon" onclick="toggleCart()">
🛒
<span id="cart-count">0</span>
</div>

<div class="cart hidden" id="cart">

<div class="cart-header">
<h2>Shopping Cart</h2>

<button onclick="toggleCart()">
Close
</button>
</div>

<div id="cart-items"></div>

<h3>
Total: ₱<span id="total">0</span>
</h3>

<div class="checkout-form">

<input
type="text"
id="customer_name"
placeholder="Customer Name"
>

<input
type="text"
id="store_name"
placeholder="Store Name"
>

<input
type="text"
id="address"
placeholder="Complete Address"
>

<input
type="text"
id="cell_number"
placeholder="Cellphone Number"
>

<div class="gps-box" id="gps_location">
GPS: Detecting...
</div>

<button
class="checkout-btn"
onclick="checkout()"
>
Checkout
</button>

<div id="receipt"></div>

</div>

</div>

<script>

/* =========================
SUPABASE
========================= */

const SUPABASE_URL =
"https://gwqnvhbzvzfzryxxdmui.supabase.co";

const SUPABASE_KEY =
"sb_publishable_okO0KEz-dX9jWd4f5ixtTQ_w0PZEhNw";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

/* =========================
VARIABLES
========================= */

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let latitude = "";
let longitude = "";
let gpsLocation = "Unavailable";
let googleMapLink = "";

const productsDiv =
document.getElementById("products");

/* =========================
LOAD PRODUCTS
========================= */

async function loadProducts(){

try{

const { data, error } =
await supabaseClient
.from("products")
.select("*");

if(error){
console.log(error);
alert("Failed to load products");
return;
}

displayProducts(data);

}catch(err){

console.log(err);

alert("Error loading products");
}
}

/* =========================
DISPLAY PRODUCTS
========================= */

function displayProducts(products){

productsDiv.innerHTML = "";

products.forEach(product=>{

productsDiv.innerHTML += `

<div class="card">

<img src="${product.image_url}">

<div class="card-body">

<h3>${product.name}</h3>

<p class="price">
₱${product.price}
</p>

<button
class="add-btn"
onclick='addToCart(
${JSON.stringify(product)}
)'
>

Add

</button>

</div>
</div>
`;
});
}

/* =========================
ADD TO CART
========================= */

function addToCart(product){

const existing =
cart.find(item=>item.id===product.id);

if(existing){

existing.qty++;

}else{

cart.push({
...product,
qty:1
});
}

saveCart();
renderCart();
}

/* =========================
SAVE CART
========================= */

function saveCart(){

localStorage.setItem(
"cart",
JSON.stringify(cart)
);
}

/* =========================
RENDER CART
========================= */

function renderCart(){

const cartItems =
document.getElementById("cart-items");

cartItems.innerHTML = "";

let total = 0;
let count = 0;

cart.forEach((item,index)=>{

total += item.price * item.qty;
count += item.qty;

cartItems.innerHTML += `

<div class="cart-item">

<h4>${item.name}</h4>

<p>₱${item.price}</p>

<p>Qty: ${item.qty}</p>

<div class="qty-controls">

<button onclick="changeQty(${index},-1)">
-
</button>

<button onclick="changeQty(${index},1)">
+
</button>

<button onclick="removeItem(${index})">
Remove
</button>

</div>

</div>
`;
});

document.getElementById("total")
.innerText = total;

document.getElementById("cart-count")
.innerText = count;
}

/* =========================
CHANGE QTY
========================= */

function changeQty(index,change){

cart[index].qty += change;

if(cart[index].qty <= 0){

cart.splice(index,1);
}

saveCart();
renderCart();
}

/* =========================
REMOVE ITEM
========================= */

function removeItem(index){

cart.splice(index,1);

saveCart();
renderCart();
}

/* =========================
TOGGLE CART
========================= */

function toggleCart(){

document.getElementById("cart")
.classList.toggle("hidden");
}

/* =========================
GPS LOCATION
========================= */

function detectLocation(){

if(!navigator.geolocation){

document.getElementById(
"gps_location"
).innerHTML =
"GPS Not Supported";

return;
}

navigator.geolocation.getCurrentPosition(

(position)=>{

latitude =
position.coords.latitude;

longitude =
position.coords.longitude;

gpsLocation =
`${latitude}, ${longitude}`;

googleMapLink =
`https://www.google.com/maps?q=${latitude},${longitude}`;

document.getElementById(
"gps_location"
).innerHTML =

`GPS Captured
<br><br>
<a
href="${googleMapLink}"
target="_blank"
style="color:yellow;"
>
Open Google Maps
</a>`;

},

(error)=>{

document.getElementById(
"gps_location"
).innerHTML =
"GPS Permission Denied";

console.log(error);
}

);
}

/* =========================
CHECKOUT
========================= */

async function checkout(){

if(cart.length===0){

alert("Cart is empty");
return;
}

const customer_name =
document.getElementById(
"customer_name"
).value;

const store_name =
document.getElementById(
"store_name"
).value;

const address =
document.getElementById(
"address"
).value;

const cell_number =
document.getElementById(
"cell_number"
).value;

if(
!customer_name ||
!store_name ||
!address ||
!cell_number
){

alert("Please complete all fields");
return;
}

/* SAVE CUSTOMER */

const customerSave =
await supabaseClient
.from("customers")
.insert([{

customer_name,
store_name,
address,
cell_number,
gps_location:gpsLocation,
latitude,
longitude,
google_map:googleMapLink

}]);

if(customerSave.error){

console.log(customerSave.error);

alert("Failed to save customer");

return;
}

/* SAVE SALES */

const receipt =
"RCPT-" + Date.now();

let grandTotal = 0;

for(const item of cart){

const total =
item.price * item.qty;

grandTotal += total;

await supabaseClient
.from("sales")
.insert([{

receipt_id:receipt,
products:item.name,
qty:item.qty,
price:item.price,
total,
customers:customer_name

}]);
}

/* RECEIPT */

document.getElementById("receipt")
.innerHTML = `

<div class="receipt-box">

RECEIPT
------------------

Receipt:
${receipt}

Customer:
${customer_name}

Total:
₱${grandTotal}

Items:
${cart.map(item=>
`${item.name} x${item.qty}`
).join("<br>")}

</div>
`;

alert("Checkout Success");

/* CLEAR CART */

cart = [];

saveCart();

renderCart();
}

/* =========================
SEARCH
========================= */

document.getElementById("search")
.addEventListener("input",(e)=>{

const keyword =
e.target.value.toLowerCase();

const cards =
document.querySelectorAll(".card");

cards.forEach(card=>{

const name =
card.innerText.toLowerCase();

card.style.display =
name.includes(keyword)
? "block"
: "none";

});
});

/* =========================
START
========================= */

detectLocation();

loadProducts();

renderCart();

</script>

</body>
</html>
