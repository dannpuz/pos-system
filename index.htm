<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ultra Fast POS</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

/* =========================
BASE
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0f172a;
  color:white;
}

/* =========================
HEADER
========================= */

header{
  position:sticky;
  top:0;
  background:#111827;
  padding:10px;
  display:flex;
  gap:10px;
  z-index:10;
}

#search{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

/* =========================
GRID
========================= */

.product-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

/* =========================
CARD
========================= */

.card{
  background:white;
  color:black;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

.card-body{
  padding:8px;
}

.price{
  color:#2563eb;
  font-weight:bold;
}

/* =========================
BUTTON
========================= */

.add-btn{
  width:100%;
  padding:8px;
  border:none;
  background:#3b82f6;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* =========================
FLOAT CART ICON (FIXED)
========================= */

.cart-fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#2563eb;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  z-index:1000;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* =========================
CART PANEL
========================= */

.cart{
  position:fixed;
  right:0;
  top:0;
  width:320px;
  height:100vh;
  background:#111827;
  padding:10px;
  overflow:auto;
  z-index:999;
}

/* =========================
CART ITEMS
========================= */

.cart-item{
  background:#1f2937;
  padding:8px;
  margin-bottom:8px;
  border-radius:8px;
}

.qty{
  display:flex;
  gap:8px;
  align-items:center;
  margin-top:5px;
}

.qty button{
  padding:5px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* =========================
CHECKOUT PANEL (FIX MOBILE)
========================= */

.checkout{
  margin-top:10px;
  padding:10px;
  background:#0b1220;
  border-radius:10px;
}

.checkout input{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:none;
  border-radius:6px;
}

/* =========================
OFFLINE
========================= */

.offline{
  background:red;
  text-align:center;
  font-size:12px;
  padding:5px;
  display:none;
}

/* =========================
MOBILE FIX
========================= */

@media(max-width:768px){
  .product-grid{
    grid-template-columns:repeat(2,1fr);
  }

  .cart{
    width:100%;
    height:60%;
    bottom:0;
    top:auto;
    border-top-left-radius:15px;
    border-top-right-radius:15px;
  }
}

</style>
</head>

<body>

<div id="offline" class="offline">OFFLINE MODE</div>

<header>
<input id="search" placeholder="Search product...">
</header>

<!-- PRODUCTS -->
<div id="products" class="product-grid"></div>

<!-- FLOAT CART ICON -->
<div class="cart-fab" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<!-- CART PANEL -->
<div class="cart" id="cartPanel" style="display:none;">

<h3>Cart</h3>
<div id="cart"></div>

<!-- CUSTOMER INFO -->
<div class="checkout">

<input id="name" placeholder="Customer Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone">

<div id="gps">GPS: detecting...</div>

<button onclick="checkout()" class="add-btn">
Checkout
</button>

</div>

</div>

<script>

/* =========================
SUPABASE
========================= */

const supabaseClient = supabase.createClient(
"https://gwqnvhbzvzfzryxxdmui.supabase.co",
"sb_publishable_okO0KEz-dX9jWd4f5ixtTQ_w0PZEhNw"
);

/* =========================
STATE
========================= */

let state = {
products: [],
cart: []
};

/* =========================
LOAD PRODUCTS
========================= */

async function load(){

const { data } =
await supabaseClient
.from("products")
.select("*");

state.products = data || [];
render();
}

load();

/* =========================
RENDER
========================= */

function render(){
renderProducts();
renderCart();
}

/* =========================
PRODUCTS
========================= */

function renderProducts(){

const box = document.getElementById("products");

box.innerHTML = "";

state.products.forEach(p=>{

box.innerHTML += `
<div class="card">
<img src="${p.image_url}">
<div class="card-body">
<h4>${p.name}</h4>
<p class="price">₱${p.price}</p>
<button class="add-btn" onclick="add(${p.id})">
Add
</button>
</div>
</div>
`;

});
}

/* =========================
ADD CART
========================= */

function add(id){

const p = state.products.find(x=>x.id===id);

const c = [...state.cart];

const f = c.find(i=>i.id===id);

if(f) f.qty++;
else c.push({...p, qty:1});

state.cart = c;

render();
}

/* =========================
CART RENDER
========================= */

function renderCart(){

const box = document.getElementById("cart");

let html = "";
let total = 0;
let count = 0;

state.cart.forEach((i,index)=>{

total += i.price*i.qty;
count += i.qty;

html += `
<div class="cart-item">
<b>${i.name}</b>
<p>₱${i.price}</p>

<div class="qty">
<button onclick="minus(${index})">-</button>
<span>${i.qty}</span>
<button onclick="plus(${index})">+</button>
</div>
</div>
`;

});

document.getElementById("count").innerText = count;

box.innerHTML = html + `<h3>Total ₱${total}</h3>`;
}

/* =========================
QTY
========================= */

function minus(i){
state.cart[i].qty--;
if(state.cart[i].qty<=0) state.cart.splice(i,1);
render();
}

function plus(i){
state.cart[i].qty++;
render();
}

/* =========================
TOGGLE CART
========================= */

function toggleCart(){

const el = document.getElementById("cartPanel");
el.style.display = el.style.display==="none"?"block":"none";
}

/* =========================
GPS
========================= */

let gpsText="";

navigator.geolocation?.getCurrentPosition(
pos=>{
gpsText = `${pos.coords.latitude},${pos.coords.longitude}`;
document.getElementById("gps").innerText = gpsText;
},
()=>{
gpsText="Unavailable";
document.getElementById("gps").innerText="GPS Unavailable";
}
);

/* =========================
CHECKOUT
========================= */

async function checkout(){

if(state.cart.length===0) return alert("Empty cart");

const order = {
name:document.getElementById("name").value,
address:document.getElementById("address").value,
phone:document.getElementById("phone").value,
gps:gpsText,
items:state.cart,
status:"pending"
};

if(!navigator.onLine){
localStorage.setItem("queue",
JSON.stringify([...JSON.parse(localStorage.getItem("queue")||"[]"),order])
);
return alert("Saved offline");
}

await supabaseClient.from("orders").insert([order]);

state.cart=[];
render();
}

</script>

</body>
</html>
