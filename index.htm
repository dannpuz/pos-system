<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>POS System</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#f3f4f6;
      color:#111827;
    }

    header{
      background:#111827;
      color:white;
      padding:15px;
      position:sticky;
      top:0;
      z-index:1000;
      display:flex;
      gap:10px;
      align-items:center;
    }

    header h1{
      font-size:18px;
      white-space:nowrap;
    }

    #search{
      flex:1;
      padding:10px;
      border:none;
      border-radius:10px;
    }

    .cart-icon{
      background:#3b82f6;
      width:50px;
      height:50px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      position:relative;
      font-size:22px;
    }

    #cart-count{
      position:absolute;
      top:-5px;
      right:-5px;
      background:red;
      color:white;
      width:22px;
      height:22px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
    }

    .container{
      display:flex;
    }

    .product-grid{
      flex:1;
      display:grid;
      grid-template-columns:
      repeat(auto-fill,minmax(180px,1fr));
      gap:15px;
      padding:15px;
    }

    .card{
      background:white;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    .card img{
      width:100%;
      height:150px;
      object-fit:cover;
    }

    .card-body{
      padding:10px;
    }

    .card h3{
      font-size:16px;
      margin-bottom:8px;
    }

    .price{
      color:#2563eb;
      font-weight:bold;
      margin-bottom:10px;
    }

    .add-btn{
      width:100%;
      padding:10px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      cursor:pointer;
    }

    .cart{
      width:350px;
      background:#111827;
      color:white;
      height:100vh;
      overflow:auto;
      padding:20px;
      position:sticky;
      top:0;
    }

    .hidden{
      display:none;
    }

    .cart-header{
      display:flex;
      justify-content:space-between;
      margin-bottom:20px;
    }

    .cart-item{
      border-bottom:1px solid #374151;
      padding-bottom:10px;
      margin-bottom:10px;
    }

    .qty-controls{
      display:flex;
      gap:5px;
      margin-top:10px;
      flex-wrap:wrap;
    }

    .qty-controls button{
      padding:6px 10px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .checkout-form{
      margin-top:20px;
    }

    .checkout-form input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      margin-bottom:10px;
    }

    .gps-box{
      background:#1f2937;
      padding:10px;
      border-radius:10px;
      margin-bottom:10px;
      font-size:13px;
    }

    .checkout-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#10b981;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    @media(max-width:768px){

      .container{
        flex-direction:column;
      }

      .product-grid{
        grid-template-columns:
        repeat(2,1fr);
      }

      .card img{
        height:120px;
      }

      .card h3{
        font-size:14px;
      }

      .cart{
        width:100%;
        height:auto;
      }

    }

  </style>

</head>

<body>

<header>

  <h1>ORDER FORM</h1>

  <input
    type="text"
    id="search"
    placeholder="Search product..."
  >

  <div
    class="cart-icon"
    onclick="toggleCart()"
  >
    🛒
    <span id="cart-count">0</span>
  </div>

</header>

<div class="container">

  <div
    id="products"
    class="product-grid"
  ></div>

  <div
    class="cart hidden"
    id="cart"
  >

    <div class="cart-header">

      <h2>Shopping Cart</h2>

      <button onclick="toggleCart()">
        Hide
      </button>

    </div>

    <div id="cart-items"></div>

    <h3>
      Total: ₱<span id="total">0</span>
    </h3>

    <div class="checkout-form">

      <input
        type="text"
        id="customer_name"
        placeholder="Customer Name"
      >

      <input
        type="text"
        id="store_name"
        placeholder="Store Name"
      >

      <input
        type="text"
        id="address"
        placeholder="Complete Address"
      >

      <input
        type="text"
        id="cell_number"
        placeholder="Cellphone Number"
      >

      <div
        class="gps-box"
        id="gps_location"
      >
        GPS: Detecting location...
      </div>

      <button
        class="checkout-btn"
        onclick="checkout()"
      >
        Checkout
      </button>

    </div>

  </div>

</div>

<audio
  id="addSound"
  src="sounds/add.mp3"
></audio>

<script>

const SUPABASE_URL =
"https://gwqnvhbzvzfzryxxdmui.supabase.co";

const SUPABASE_KEY =
"sb_publishable_okO0KEz-dX9jWd4f5ixtTQ_w0PZEhNw";

const supabaseClient =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const productsDiv =
document.getElementById("products");

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let latitude = "";
let longitude = "";
let gpsLocation = "Unavailable";
let googleMapLink = "";


// ======================
// LOAD PRODUCTS
// ======================

async function loadProducts(){

  try{

    const {
      data,
      error
    } = await supabaseClient
      .from("products")
      .select("*")
      .order("id",{ascending:false});

    if(error){

      console.log(error);

      productsDiv.innerHTML =
      "<h2>Failed to load products</h2>";

      return;
    }

    displayProducts(data);

  }catch(err){

    console.log(err);

    productsDiv.innerHTML =
    "<h2>Error loading products</h2>";
  }
}


// ======================
// DISPLAY PRODUCTS
// ======================

function displayProducts(products){

  productsDiv.innerHTML = "";

  if(products.length === 0){

    productsDiv.innerHTML =
    "<h2>No products found</h2>";

    return;
  }

  products.forEach(product=>{

    productsDiv.innerHTML += `

      <div class="card">

        <img
          src="${product.image_url}"
          onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'"
        >

        <div class="card-body">

          <h3>${product.name}</h3>

          <p class="price">
            ₱${product.price}
          </p>

          <button
            class="add-btn"
            onclick='addToCart(
              ${product.id},
              ${JSON.stringify(product.name)},
              ${product.price},
              ${JSON.stringify(product.image_url)}
            )'
          >
            Add To Cart
          </button>

        </div>

      </div>

    `;
  });
}


// ======================
// ADD TO CART
// ======================

function addToCart(
  id,
  name,
  price,
  image_url
){

  const sound =
  document.getElementById("addSound");

  if(sound){
    sound.play();
  }

  const existing =
  cart.find(item=>item.id===id);

  if(existing){

    existing.qty++;

  }else{

    cart.push({
      id,
      name,
      price:Number(price),
      image_url,
      qty:1
    });
  }

  saveCart();

  renderCart();
}


// ======================
// SAVE CART
// ======================

function saveCart(){

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );
}


// ======================
// RENDER CART
// ======================

function renderCart(){

  const cartItems =
  document.getElementById("cart-items");

  cartItems.innerHTML = "";

  let total = 0;
  let count = 0;

  cart.forEach((item,index)=>{

    total += item.price * item.qty;

    count += item.qty;

    cartItems.innerHTML += `

      <div class="cart-item">

        <h4>${item.name}</h4>

        <p>₱${item.price}</p>

        <p>Qty: ${item.qty}</p>

        <div class="qty-controls">

          <button
            onclick="changeQty(${index},-1)">
            -
          </button>

          <button
            onclick="changeQty(${index},1)">
            +
          </button>

          <button
            onclick="removeItem(${index})">
            Remove
          </button>

        </div>

      </div>

    `;
  });

  document.getElementById("total")
  .innerText = total;

  document.getElementById("cart-count")
  .innerText = count;
}


// ======================
// CHANGE QTY
// ======================

function changeQty(index,change){

  cart[index].qty += change;

  if(cart[index].qty <= 0){

    cart.splice(index,1);
  }

  saveCart();

  renderCart();
}


// ======================
// REMOVE ITEM
// ======================

function removeItem(index){

  cart.splice(index,1);

  saveCart();

  renderCart();
}


// ======================
// TOGGLE CART
// ======================

function toggleCart(){

  document.getElementById("cart")
  .classList.toggle("hidden");
}


// ======================
// RECEIPT
// ======================

function generateReceipt(){

  return "RCPT-" + Date.now();
}


// ======================
// GPS DETECT
// ======================

async function detectLocation(){

  const gpsBox =
  document.getElementById("gps_location");

  if(!navigator.geolocation){

    gpsBox.innerHTML =
    "GPS Not Supported";

    return;
  }

  navigator.geolocation.getCurrentPosition(

    async(position)=>{

      latitude =
      position.coords.latitude;

      longitude =
      position.coords.longitude;

      gpsLocation =
      `${latitude}, ${longitude}`;

      googleMapLink =
      `https://www.google.com/maps?q=${latitude},${longitude}`;

      gpsBox.innerHTML = `
        GPS Captured<br><br>
        <a
          href="${googleMapLink}"
          target="_blank"
          style="color:yellow;"
        >
          Open Google Maps
        </a>
      `;
    },

    (error)=>{

      gpsBox.innerHTML =
      "GPS Permission Denied";

      console.log(error);
    },

    {
      enableHighAccuracy:true,
      timeout:10000
    }

  );
}


// ======================
// CHECKOUT
// ======================

async function checkout(){

  if(cart.length === 0){

    alert("Cart is empty");

    return;
  }

  const customer_name =
  document.getElementById(
    "customer_name"
  ).value;

  const store_name =
  document.getElementById(
    "store_name"
  ).value;

  const address =
  document.getElementById(
    "address"
  ).value;

  const cell_number =
  document.getElementById(
    "cell_number"
  ).value;

  if(
    !customer_name ||
    !store_name ||
    !address ||
    !cell_number
  ){

    alert("Please fill all fields");

    return;
  }

  const customerResult =
  await supabaseClient
    .from("customers")
    .insert([{

      customer_name,
      store_name,
      address,
      cell_number,
      gps_location:gpsLocation,
      latitude,
      longitude,
      google_map:googleMapLink

    }]);

  if(customerResult.error){

    console.log(customerResult.error);

    alert("Failed to save customer");

    return;
  }

  const receipt =
  generateReceipt();

  let grandTotal = 0;

  for(const item of cart){

    const total =
    item.price * item.qty;

    grandTotal += total;

    await supabaseClient
      .from("sales")
      .insert([{

        receipt_id:receipt,
        products:item.name,
        qty:item.qty,
        price:item.price,
        total,
        customers:customer_name

      }]);
  }

  alert(
`Checkout Success

Receipt:
${receipt}

Total:
₱${grandTotal}`
  );

  cart = [];

  saveCart();

  renderCart();
}


// ======================
// SEARCH
// ======================

document.getElementById("search")
.addEventListener("input",(e)=>{

  const keyword =
  e.target.value.toLowerCase();

  const cards =
  document.querySelectorAll(".card");

  cards.forEach(card=>{

    const name =
    card.innerText.toLowerCase();

    card.style.display =
    name.includes(keyword)
    ? "block"
    : "none";
  });
});


// ======================
// START
// ======================

detectLocation();

loadProducts();

renderCart();

</script>

</body>
</html>
